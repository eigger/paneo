<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paneo Editor</title>
  <link rel="stylesheet" href="/editor/editor.css" />
</head>
<body>
  <header>
    <div class="brand">Paneo <span class="tag" id="editor-version-tag" data-i18n="tag"></span></div>

    <!-- editing: what you're building right now -->
    <div class="toolbar" id="edit-toolbar">
      <label class="sel"><span data-i18n="device"></span>
        <select id="device-select"></select>
        <button type="button" id="device-add-btn" class="icon-btn small" title="Add device">+</button>
      </label>
      <div class="palette-wrap">
        <button id="palette-btn" class="palette-btn" aria-haspopup="menu" aria-expanded="false">
          <span data-i18n="addWidget"></span>
        </button>
        <div id="palette" class="palette hidden" role="menu"></div>
      </div>
      <span id="save-state" class="save-state"></span>
      <a id="open-display" href="#" target="_blank" class="link" data-i18n="openDisplay"></a>
      <button id="apply" class="apply" data-i18n="apply"></button>
    </div>

    <!-- settings: app/device config, not part of the editing flow -->
    <button id="settings-btn" class="icon-btn" title="Settings" aria-haspopup="dialog">⚙</button>
  </header>

  <div id="settings-overlay" class="overlay hidden">
    <div id="settings-panel" role="dialog" aria-modal="true">
      <h3 data-i18n="settingsTitle"></h3>
      <div class="field">
        <label data-i18n="lang"></label>
        <select id="lang-select"></select>
      </div>
      <div class="field">
        <label data-i18n="localeLabel"></label>
        <select id="locale-select"></select>
      </div>
      <div class="field">
        <label data-i18n="resolutionLabel"></label>
        <select id="resolution-select"></select>
        <div id="resolution-custom" class="grid2 hidden">
          <label>W<input type="number" id="resolution-w" min="100" step="10"></label>
          <label>H<input type="number" id="resolution-h" min="100" step="10"></label>
        </div>
        <button type="button" id="resolution-rotate" class="settings-close" data-i18n="rotate"></button>
      </div>
      <div class="field">
        <label data-i18n="perfLabel"></label>
        <select id="perf-select"></select>
      </div>

      <hr class="settings-divider" />

      <div class="field">
        <label data-i18n="groupLabel"></label>
        <select id="group-select"></select>
        <div class="group-new-row">
          <input type="text" id="group-new-name" data-i18n-placeholder="groupNewPlaceholder" />
          <button type="button" id="group-new-btn" data-i18n="groupNewBtn"></button>
        </div>
        <button type="button" id="group-apply-btn" class="settings-close" data-i18n="groupApplyBtn"></button>
      </div>

      <hr class="settings-divider" />

      <div class="field">
        <label data-i18n="remoteLabel"></label>
        <div id="device-connected" class="muted"></div>
        <div id="agent-status" class="agent-badge"></div>
        <div class="button-row">
          <button type="button" id="cmd-reload-btn" data-i18n="cmdReload"></button>
          <button type="button" id="cmd-identify-btn" data-i18n="cmdIdentify"></button>
        </div>
        <div class="button-row">
          <button type="button" id="cmd-power-on-btn" class="power-on" data-i18n="powerOn" disabled></button>
          <button type="button" id="cmd-power-off-btn" class="power-off" data-i18n="powerOff" disabled></button>
        </div>
        <div class="update-check-row">
          <div class="update-check-status" id="update-check-status"></div>
          <button type="button" id="update-check-btn" class="icon-btn small" title="Check for updates">🔄</button>
        </div>
        <div class="button-row">
          <button type="button" id="cmd-update-all-btn" data-i18n="updateAll" disabled></button>
          <button type="button" id="cmd-update-server-btn" data-i18n="updateServer" disabled></button>
        </div>
        <div class="update-progress-status" id="update-progress-status"></div>
        <p class="field-hint" data-i18n="updateHint"></p>
      </div>

      <hr class="settings-divider" />

      <div class="field">
        <label data-i18n="powerLabel"></label>
        <div class="power-schedule-status" id="power-schedule-status"></div>
        <div class="grid2 power-schedule-row">
          <label data-i18n="powerOnTime"></label>
          <input type="text" id="power-on-time" placeholder="HH:MM" pattern="([01][0-9]|2[0-3]):[0-5][0-9]" maxlength="5" inputmode="numeric" />
          <label data-i18n="powerOffTime"></label>
          <input type="text" id="power-off-time" placeholder="HH:MM" pattern="([01][0-9]|2[0-3]):[0-5][0-9]" maxlength="5" inputmode="numeric" />
        </div>
        <div class="button-row">
          <button type="button" id="power-save-btn" data-i18n="powerSave"></button>
          <button type="button" id="power-clear-btn" data-i18n="powerClear"></button>
        </div>
      </div>

      <div class="field">
        <label data-i18n="haSettingsLabel"></label>
        <div class="field">
          <label data-i18n="haUrlLabel"></label>
          <input type="text" id="ha-url" placeholder="http://192.168.1.100:8123" style="width:100%" />
        </div>
        <div class="field">
          <label data-i18n="haTokenLabel"></label>
          <input type="password" id="ha-token" placeholder="Long-lived Access Token" style="width:100%" />
        </div>
        <button type="button" id="ha-save-btn" class="settings-close" data-i18n="haSaveBtn"></button>
      </div>

      <hr class="settings-divider" />

      <div class="field">
        <label data-i18n="versionLabel"></label>
        <div id="component-versions" class="component-versions muted"></div>
      </div>

      <button id="settings-close" class="settings-close" data-i18n="close"></button>
      <button type="button" id="device-delete-btn" class="danger" data-i18n="deleteDevice"></button>
    </div>
  </div>

  <main>
    <section id="canvas-wrap">
      <div id="canvas"></div>
      <div id="page-selector"></div>
    </section>
    <aside id="inspector">
      <h3 data-i18n="inspector"></h3>
      <div id="inspector-body"></div>
    </aside>
  </main>

  <div id="toast"></div>
  <script type="module" src="/editor/editor.js"></script>
</body>
</html>
